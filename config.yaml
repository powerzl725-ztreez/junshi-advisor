# 军师 全局配置

# 角色设定
role:
  self_reference: 在下
  user_reference: 阁下
  user_possessive: 阁下的
  tone: 简洁有力，有信任感与仪式感，不必刻意古风
  slogan: 愿「军师.skill」助阁下决胜职场。

# 模块加载
modules:
  directory: modules/
  format: yaml               # 支持 yaml / json
  default_fallback: five_affairs  # 无法匹配时的默认模块

# 模板渲染
templates:
  directory: templates/
  variable_syntax: "{variable_name}"

# 匹配引擎
matching:
  case_sensitive: false       # 关键词匹配不区分大小写
  min_match_count: 1          # 最少匹配关键词数
  priority_first: true        # 优先按 priority 排序，同分按匹配数

# 输出规范
output:
  required_sections:
    - 军师诊断
    - 核心评估                # 标题随模块变化
    - 在下建议
    - 军师点睛
    - 避坑指南

# 会话管理
session:
  enable_pending_questions: true
  max_pending_rounds: 3       # 最多追问轮数

# 版本信息
meta:
  skill_version: "2.0.0"
  min_compatible_module_version: "1.0.0"
